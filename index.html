<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Step Analysis</title>
    <style>
        :root { --p: #8b5cf6; --bg: #09090b; }
        body { 
            background: var(--bg); color: white; font-family: 'Pretendard', sans-serif;
            display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px;
        }
        .ai-container {
            background: #18181b; border: 1px solid #27272a; padding: 40px;
            border-radius: 24px; width: 100%; max-width: 600px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .status-label { font-size: 11px; color: var(--p); letter-spacing: 2px; font-weight: bold; margin-bottom: 12px; display: block; }
        #ai-briefing { font-size: 16px; line-height: 1.8; color: #e4e4e7; margin-bottom: 25px; }
        .highlight { color: #fde047; font-weight: 600; }
        
        /* 지도 영역 - 처음엔 숨김 */
        #map-step { display: none; margin-top: 20px; }
        #map-container { 
            width: 100%; height: 350px; 
            border-radius: 15px; border: 1px solid #3f3f46; overflow: hidden;
        }
        iframe { width: 100%; height: 100%; border: none; }

        .btn-action {
            background: var(--p); color: white; border: none;
            padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="ai-container">
        <span class="status-label" id="step-title">STEP 1: SYSTEM ANALYSIS</span>
        <div id="ai-briefing">데이터 패킷을 수집하고 있습니다...</div>
        
        <button class="btn-action" id="next-btn" style="display:none;" onclick="showMapStep()">다음 (위치 확인)</button>

        <div id="map-step">
            <div id="map-container"></div>
            <p style="font-size:12px; color:#71717a; text-align:center; margin-top:10px;">위성 데이터를 바탕으로 실제 위치를 렌더링했습니다.</p>
        </div>
    </div>

<script>
    let savedData = null;

    // 페이지 접속하자마자 실행
    window.onload = async function() {
        const display = document.getElementById('ai-briefing');
        const nextBtn = document.getElementById('next-btn');

        try {
            const res = await fetch('http://ip-api.com/json/?fields=66846719');
            const d = await res.json();
            savedData = d; // 데이터 저장

            if(d.status === "success") {
                display.innerHTML = `
                    분석이 완료되었습니다. 현재 접속 지점은 <span class="highlight">${d.country} ${d.city}</span> 지역이며, 
                    <span class="highlight">${d.isp}</span> 통신망을 통해 IP <span class="highlight">${d.query}</span>번으로 연결되어 있습니다.<br><br>
                    
                    측정된 좌표는 위도 <span class="highlight">${d.lat}</span>, 경도 <span class="highlight">${d.lon}</span>입니다. 
                    상세한 위치를 확인하시려면 아래 '다음' 버튼을 눌러주십시오.
                `;
                nextBtn.style.display = 'block'; // 정보가 나오면 버튼 표시
            }
        } catch (e) {
            display.innerText = "초기 분석 중 오류가 발생했습니다.";
        }
    };

    // '다음' 버튼을 눌렀을 때 실행되는 함수
    function showMapStep() {
        const title = document.getElementById('step-title');
        const briefing = document.getElementById('ai-briefing');
        const nextBtn = document.getElementById('next-btn');
        const mapStep = document.getElementById('map-step');
        const mapContainer = document.getElementById('map-container');

        title.innerText = "STEP 2: VISUAL LOCATION";
        title.style.color = "#fde047";
        briefing.innerHTML = "좌표 지점의 실시간 지도를 불러왔습니다. 실제 위치와 일치하는지 확인해 보세요.";
        nextBtn.style.display = 'none'; // 버튼 숨기기
        
        // 지도 로드
        const freeMapUrl = `https://maps.google.com/maps?q=${savedData.lat},${savedData.lon}&z=15&output=embed`;
        mapStep.style.display = 'block';
        mapContainer.innerHTML = `<iframe src="${freeMapUrl}"></iframe>`;
    }
</script>
</body>
</html>
